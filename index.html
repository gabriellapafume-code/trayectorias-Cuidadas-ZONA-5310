  try { const snap = await getDoc(doc(db,"mapeo",key)); return snap.exists()?snap.data().value:null; }

};

document.dispatchEvent(new Event("firebaseReady"));

function badge(v){

  const c=v==="Consolidado"?"badge-c":v==="En proceso"?"badge-p":"badge-i";

}
function badgeNivel(v,opciones){
  if(!v)return`<span style="color:#cbd5e1;font-size:11px">—</span>`;
  const colors={"Diferenciada":"#7c3aed","Silábica":"#db2777","Silábica alfabética":"#ea580c","Cuasilábica":"#d97706","Alfabética":"#16a34a","Alfabética inicial":"#15803d"};

  const allColors={...colors,...colors12};
  const col=allColors[v]||"#475569";
  return`<span style="background:${col}18;color:${col};border:1px solid ${col}44;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700">${v}</span>`;
}
function barra(c=0,p=0,i=0,t){

}

// ── GRÁFICO DE NIVELES ──────────────────────────────────
function graficoNiveles(estudiantes, grado, corte){
  const ests=estudiantes.filter(e=>e.grado===grado);
  if(!ests.length) return`<div style="text-align:center;padding:20px;color:#94a3b8;font-size:13px">Sin datos para graficar</div>`;

  // Escritura (1°2°3°)
  const tieneEscritura=["1°","2°","3°"].includes(grado);
  // Lectura (1°2°)
  const tieneLectura12=["1°","2°"].includes(grado);
  // Fluidez lectora (3°4°5°6°)
  const tieneFluidez=["3°","4°","5°","6°"].includes(grado);

  let html=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:12px">`;

  if(tieneEscritura){
    const nivs=NIV_ESCRITURA;
    const counts=nivs.map(n=>ests.filter(e=>e[`escritura_${corte}`]===n).length);
    const total=counts.reduce((a,b)=>a+b,0)||1;
    const colors=["#7c3aed","#db2777","#ea580c","#d97706","#16a34a"];
    html+=graficoBarra("📝 Nivel de Escritura",nivs,counts,total,colors);
  }
  if(tieneLectura12){
    const nivs=NIV_LECTURA_12;
    const counts=nivs.map(n=>ests.filter(e=>e[`lectura12_${corte}`]===n).length);
    const total=counts.reduce((a,b)=>a+b,0)||1;
    const colors=["#7c3aed","#db2777","#16a34a"];
    html+=graficoBarra("📖 Nivel de Lectura",nivs,counts,total,colors);
  }
  if(tieneFluidez){
    const dims=["Velocidad","Precisión","Prosodia"];
    const colors=["#0ea5e9","#6366f1","#f59e0b"];
    dims.forEach((dim,di)=>{
      const vals=LOGRO;
      const counts=vals.map(v=>ests.filter(e=>e[`fluidez_${dim}_${corte}`]===v).length);
      const total=counts.reduce((a,b)=>a+b,0)||1;
      const cols=["#16a34a","#d97706","#dc2626"];
      html+=graficoBarra(`📖 Fluidez · ${dim}`,vals,counts,total,cols);
    });
  }
  html+=`</div>`;
  return html;
}

function graficoBarra(titulo,etiquetas,counts,total,colors){
  return`<div style="background:#f8fafc;border-radius:12px;padding:16px;border:1px solid #e2e8f0">
    <div style="font-weight:700;font-size:13px;color:#1e293b;margin-bottom:12px">${titulo}</div>
    ${etiquetas.map((et,i)=>{
      const pct=Math.round((counts[i]||0)/total*100);
      return`<div style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#475569;margin-bottom:3px">
          <span>${et}</span><span style="font-weight:700">${counts[i]||0} (${pct}%)</span>
        </div>
        <div style="height:10px;background:#e2e8f0;border-radius:5px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:${colors[i%colors.length]};border-radius:5px;transition:width .3s"></div>
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

function vistaSupervisor(){
  const area=STATE.supArea,g=STATE.supGrado;
  const inds=(area==="lengua"?INDS.lengua:INDS.matematica)[g]||[];
  const stats=id=>{
    const ests=(STATE.allData[id]||[]).filter(e=>e.grado===g);
    return{total:ests.length,porInd:inds.map(ind=>{
      const k=`${area}_${g}_${ind}`,vs=ests.map(e=>e.indicadores?.[k]).filter(Boolean);
      return{ind,c:vs.filter(v=>v==="Consolidado").length,p:vs.filter(v=>v==="En proceso").length,i:vs.filter(v=>v==="Incipiente").length,total:vs.length};
    })};
  };
  const det=STATE.supSel?(()=>{
    const ests=(STATE.allData[STATE.supSel.id]||[]).filter(e=>e.grado===g).sort((a,b)=>a.apellido.localeCompare(b.apellido));
    return`<div style="background:#f0f9ff;border:2px solid #bae6fd;border-radius:14px;padding:20px;margin-bottom:16px">
      <h4 style="font-family:'Playfair Display',serif;margin:0 0 14px;color:#0369a1;font-size:17px">${STATE.supSel.nombre} · ${area==="lengua"?"📚 Lengua":"🔢 Matemática"} · ${g}</h4>
      ${ests.length===0?`<p style="color:#94a3b8">Sin datos.</p>`:`<div style="overflow-x:auto"><table style="width:100%;border-collapse:separate;border-spacing:0;font-size:11px">
        <thead><tr style="background:#0369a1"><th>Alumno/a</th>${inds.map(i=>`<th style="padding:8px 10px;color:#fff;font-size:10px;white-space:normal;line-height:1.3;text-align:left">${i}</th>`).join("")}</tr></thead>
        <tbody>${ests.map((e,idx)=>`<tr style="background:${idx%2===0?"#fff":"#f0f9ff"}"><td style="font-weight:700;white-space:nowrap">${e.apellido}, ${e.nombre}</td>${inds.map(ind=>`<td style="text-align:center">${badge(e.indicadores?.[`${area}_${g}_${ind}`])}</td>`).join("")}</tr>`).join("")}</tbody>
      </table></div>`}
    </div>`;
  })():"";

  return`${header("Panel Inspectora · Trayectorias Cuidadas 5310 Oeste","Instituciones Departamento Santa María")}
  <div style="padding:24px;max-width:1400px;margin:0 auto">
    ${leyenda()}
    <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:flex-end">
      <div><div style="font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:3px;text-transform:uppercase">Área</div>
        <div style="display:flex;gap:6px">
          ${["lengua","matematica"].map(a=>`<button onclick="setState({supArea:'${a}',supSel:null})" style="padding:7px 16px;border-radius:8px;border:1.5px solid;font-weight:700;font-size:12px;cursor:pointer;font-family:'Source Sans 3',sans-serif;border-color:${area===a?(a==="lengua"?"#6366f1":"#0ea5e9"):"#e2e8f0"};background:${area===a?(a==="lengua"?"#6366f1":"#0ea5e9"):"#fff"};color:${area===a?"#fff":"#475569"}">${a==="lengua"?"📚 Lengua":"🔢 Matemática"}</button>`).join("")}
        </div>
      </div>
      <div><div style="font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:3px;text-transform:uppercase">Grado</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${GRADOS.map(gr=>`<button onclick="setState({supGrado:'${gr}',supSel:null})" style="padding:7px 14px;border-radius:8px;border:1.5px solid;font-weight:700;font-size:12px;cursor:pointer;font-family:'Source Sans 3',sans-serif;border-color:${g===gr?"#1e293b":"#e2e8f0"};background:${g===gr?"#1e293b":"#fff"};color:${g===gr?"#fff":"#475569"}">${gr}</button>`).join("")}
        </div>
      </div>
    </div>
    <div style="background:#fff;border-radius:16px;padding:22px;box-shadow:0 2px 16px #0001">
      ${STATE.loading?loader("Cargando todas las escuelas..."):det+`<div style="overflow-x:auto"><table style="width:100%;border-collapse:separate;border-spacing:0;font-size:12px">
        <thead><tr style="background:#1e293b"><th>Institución</th><th style="text-align:center">Alumnos</th>${inds.map(i=>`<th style="padding:8px 10px;color:#fff;font-size:10px;max-width:110px;white-space:normal;line-height:1.3;text-align:left">${i}</th>`).join("")}</tr></thead>
        <tbody>${ESCUELAS.map((esc,idx)=>{const{total,porInd}=stats(esc.id);const ac=STATE.supSel?.id===esc.id;
          return`<tr style="background:${ac?"#eff6ff":idx%2===0?"#f8fafc":"#fff"};cursor:pointer" onclick="toggleSupSel('${esc.id}')">
            <td style="font-weight:700;color:#1e293b"><span style="margin-right:6px;color:#94a3b8;font-size:10px">${ac?"▼":"▶"}</span>${esc.nombre}</td>
            <td style="text-align:center;font-weight:700">${total>0?total:`<span style="color:#cbd5e1">—</span>`}</td>
            ${porInd.map(({c,p,i:iv,total:t})=>`<td>${barra(c,p,iv,t)}</td>`).join("")}
          </tr>`;}).join("")}
        </tbody>
      </table></div>`}
    </div>
  </div>`;
}

// ── IMPRIMIR FICHAS ─────────────────────────────────────
function imprimirFicha(){
  const esc=STATE.escuela;
  const ests=(STATE.allData[esc.id]||[]).sort((a,b)=>a.apellido.localeCompare(b.apellido));
  if(!ests.length){alert("No hay estudiantes cargados.");return;}
  const win=window.open("","_blank");
  const filas=ests.map(e=>{
    const g=e.grado;
    const iL=INDS.lengua[g]||[],iM=INDS.matematica[g]||[];
    const colorLogro=v=>v==="Consolidado"?"#16a34a":v==="En proceso"?"#d97706":v==="Incipiente"?"#dc2626":"#94a3b8";
    const colorNivel=v=>{const m={"Diferenciada":"#7c3aed","Silábica":"#db2877","Silábica alfabética":"#ea580c","Cuasilábica":"#d97706","Alfabética":"#16a34a","Alfabética inicial":"#15803d"};return m[v]||"#475569";};
    return`<div style="border:1.5px solid #e2e8f0;border-radius:10px;padding:16px;margin-bottom:14px;page-break-inside:avoid;font-family:'Source Sans 3',sans-serif">
      <div style="display:flex;justify-content:space-between;margin-bottom:10px;border-bottom:1px solid #e2e8f0;padding-bottom:8px">
        <div><b style="font-size:15px">${e.apellido}, ${e.nombre}</b><br/><span style="font-size:12px;color:#64748b">${e.grado}${e.seccion?" · Sección "+e.seccion:""} · ${esc.nombre}</span></div>
        <div style="font-size:11px;color:#94a3b8;text-align:right">Trayectorias Cuidadas · Zona 5310 Oeste<br/>Supervisora: Gabriela de los Ángeles Navarrete</div>
      </div>
      ${["1°","2°","3°"].includes(g)?`<div style="margin-bottom:8px"><b style="font-size:11px;color:#7c3aed">✍️ NIVEL DE ESCRITURA</b><br/>${CORTES.map(c=>`<span style="font-size:11px;margin-right:12px"><b>${c}:</b> <span style="color:${colorNivel(e["escritura_"+c])}">${e["escritura_"+c]||"—"}</span></span>`).join("")}</div>`:""}
      ${["1°","2°"].includes(g)?`<div style="margin-bottom:8px"><b style="font-size:11px;color:#db2877">📖 NIVEL DE LECTURA</b><br/>${CORTES.map(c=>`<span style="font-size:11px;margin-right:12px"><b>${c}:</b> <span style="color:${colorNivel(e["lectura12_"+c])}">${e["lectura12_"+c]||"—"}</span></span>`).join("")}</div>`:""}
      ${["3°","4°","5°","6°"].includes(g)?`<div style="margin-bottom:8px"><b style="font-size:11px;color:#0ea5e9">📖 FLUIDEZ LECTORA</b><br/>${["Velocidad","Precisión","Prosodia"].map(dim=>`<div style="font-size:11px"><b>${dim}:</b> ${CORTES.map(c=>`<span style="margin-right:10px"><b>${c}:</b> <span style="color:${colorLogro(e["fluidez_"+dim+"_"+c])}">${e["fluidez_"+dim+"_"+c]||"—"}</span></span>`).join("")}</div>`).join("")}</div>`:""}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
        <div><b style="font-size:11px;color:#4338ca">📚 LENGUA</b>${iL.map(ind=>`<div style="font-size:10px;color:#475569;margin-top:3px">${ind}: <b style="color:${colorLogro(e.indicadores?.[`lengua_${g}_${ind}`])}">${e.indicadores?.[`lengua_${g}_${ind}`]||"—"}</b></div>`).join("")}</div>
        <div><b style="font-size:11px;color:#0369a1">🔢 MATEMÁTICA</b>${iM.map(ind=>`<div style="font-size:10px;color:#475569;margin-top:3px">${ind}: <b style="color:${colorLogro(e.indicadores?.[`matematica_${g}_${ind}`])}">${e.indicadores?.[`matematica_${g}_${ind}`]||"—"}</b></div>`).join("")}</div>
      </div>
      ${e.observaciones?`<div style="margin-top:8px;font-size:11px;color:#64748b;font-style:italic;border-top:1px solid #e2e8f0;padding-top:6px">📝 ${e.observaciones}</div>`:""}
    </div>`;
  }).join("");
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Fichas · ${esc.nombre}</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>body{font-family:'Source Sans 3',sans-serif;padding:20px;max-width:800px;margin:0 auto}@media print{@page{margin:1cm}}</style>
  </head><body>
  <div style="text-align:center;margin-bottom:20px;border-bottom:2px solid #1e293b;padding-bottom:14px">
    <div style="font-size:10px;color:#94a3b8;letter-spacing:2px;text-transform:uppercase">Sede de Inspección 5310 · Zona Oeste · Instituciones Departamento Santa María</div>
    <div style="font-size:22px;font-weight:900;color:#1e293b">Trayectorias Cuidadas</div>
    <div style="font-size:14px;color:#475569">${esc.nombre} · Supervisora: Gabriela de los Ángeles Navarrete</div>
    <div style="font-size:12px;color:#94a3b8">Cortes evaluativos: Mayo · Agosto · Diciembre · Año ${new Date().getFullYear()}</div>
  </div>
  ${filas}
  </body></html>`);
  win.document.close();
  setTimeout(()=>win.print(),600);
}

// ── ACCIONES ────────────────────────────────────────────
async function selEscuela(id){
  const esc=ESCUELAS.find(e=>e.id===id);
  setState({modo:"escuela",escuela:esc,tab:"carga",loading:true,filtroGrado:"",busqEst:""});
  const data=await dbGet(`esc-${id}`);
  setState({allData:{...STATE.allData,[id]:data?JSON.parse(data):[]},loading:false});
}
async function irSupervisor(){
  setState({modo:"supervisor",loading:true,supSel:null});
  const entries=await Promise.all(ESCUELAS.map(e=>dbGet(`esc-${e.id}`).then(d=>[e.id,d?JSON.parse(d):[]])));
  const o={};entries.forEach(([id,d])=>o[id]=d);
  setState({allData:o,loading:false});
}
function irInicio(){setState({modo:"inicio",escuela:null,busq:"",supSel:null});}
function abrirModal(){setState({modal:{mode:"new",est:null}});}
function editarEst(est){setState({modal:{mode:"edit",est:JSON.parse(JSON.stringify(est))}});}
function cerrarModal(){setState({modal:null});}
function confirmarBorrar(est){setState({del:est});}
function cambiarGrado(grado){STATE.modal={...STATE.modal,est:{...(STATE.modal.est||{}),grado,indicadores:{}}};render();}
function updateInd(key,val){if(STATE.modal)STATE.modal.est.indicadores={...(STATE.modal.est.indicadores||{}),[key]:val};}
function updateExtra(key,val){if(STATE.modal)STATE.modal.est={...STATE.modal.est,[key]:val};}

async function guardarEstudiante(){
  const m=STATE.modal;
  const apellido=document.getElementById("m-apellido")?.value.trim()||"";
  const nombre=document.getElementById("m-nombre")?.value.trim()||"";
  const grado=document.getElementById("m-grado")?.value||"";
  const seccion=document.getElementById("m-seccion")?.value||"";
  const observaciones=document.getElementById("m-obs")?.value.trim()||"";
  if(!apellido||!nombre){alert("Completá nombre y apellido.");return;}
  const indicadores={...(m.est?.indicadores||{})};
  document.querySelectorAll("[data-ind]").forEach(s=>{if(s.value)indicadores[s.dataset.ind]=s.value;});
  const extras={};
  document.querySelectorAll("[data-key]").forEach(s=>{if(s.value)extras[s.dataset.key]=s.value;});
  const est={...(m.est||{}),...extras,apellido,nombre,grado,seccion,observaciones,indicadores,id:m.est?.id||Date.now()};
  const escId=STATE.escuela.id,prev=STATE.allData[escId]||[];
  const upd=m.mode==="new"?[...prev,est]:prev.map(e=>e.id===est.id?est:e);
  setState({modal:null,allData:{...STATE.allData,[escId]:upd}});
  await dbSet(`esc-${escId}`,JSON.stringify(upd));
}
async function borrarEstudiante(){
  const escId=STATE.escuela.id,upd=(STATE.allData[escId]||[]).filter(e=>e.id!==STATE.del.id);
  setState({del:null,allData:{...STATE.allData,[escId]:upd}});
  await dbSet(`esc-${escId}`,JSON.stringify(upd));
}
function toggleSupSel(id){const esc=ESCUELAS.find(e=>e.id===id);setState({supSel:STATE.supSel?.id===id?null:esc});}

function render(){
  const r=document.getElementById("root");
  if(STATE.modo==="inicio")r.innerHTML=vistaInicio();
  else if(STATE.modo==="escuela")r.innerHTML=vistaEscuela();
  else if(STATE.modo==="supervisor")r.innerHTML=vistaSupervisor();
}
if(window.firebaseReady){render();}
else{document.addEventListener("firebaseReady",render,{once:true});render();}
</script>
</body>
