const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
window.dbGet = async (key) => {
  try { const snap = await getDoc(doc(db,"mapeo",key)); return snap.exists()?snap.data().value:null; }

rce Sans 3',sans-serif">✕</button></div></div>${e.grado?`<div style="margin-top:10px;display:flex;gap:14px;flex-wrap:wrap;align-items:center">${["lengua","matematica"].map(area=>{const inds=INDS[area][e.grado]||[];const bs=inds.map(ind=>{const v=e.indicadores?.[`${area}_${e.grado}_${ind}`];return v?badge(v):"";}).filter(Boolean).join("");return bs?`<span style="font-size:11px;font-weight:700;color:#94a3b8">${area==="lengua"?"📚":"🔢"}</span>${bs}`:"";}).join("")}</div>`:""}</div>`).join("")}`;

  const area=STATE.supArea,g=STATE.supGrado,inds=(area==="lengua"?INDS.lengua:INDS.matematica)[g]||[];
  const stats=id=>{const ests=(STATE.allData[id]||[]).filter(e=>e.grado===g);return{total:ests.length,porInd:inds.map(ind=>{const k=`${area}_${g}_${ind}`,vs=ests.map(e=>e.indicadores?.[k]).filter(Boolean);return{ind,c:vs.filter(v=>v==="Consolidado").length,p:vs.filter(v=>v==="En proceso").length,i:vs.filter(v=>v==="Incipiente").length,total:vs.length};})};};
  const det=STATE.supSel?(()=>{const ests=(STATE.allData[STATE.supSel.id]||[]).filter(e=>e.grado===g).sort((a,b)=>a.apellido.localeCompare(b.apellido));return`<div style="background:#f0f9ff;border:2px solid #bae6fd;border-radius:14px;padding:20px;margin-bottom:16px"><h4 style="font-family:'Playfair Display',serif;margin:0 0 14px;color:#0369a1;font-size:17px">${STATE.supSel.nombre} · ${area==="lengua"?"📚 Lengua":"🔢 Matemática"} · ${g}</h4>${ests.length===0?`<p style="color:#94a3b8">Sin datos.</p>`:`<div style="overflow-x:auto"><table style="width:100%;border-collapse:separate;border-spacing:0;font-size:11px"><thead><tr style="background:#0369a1"><th>Alumno/a</th>${inds.map(i=>`<th style="padding:8px 10px;color:#fff;font-weight:700;font-size:10px;white-space:normal;line-height:1.3;text-align:left">${i}</th>`).join("")}</tr></thead><tbody>${ests.map((e,idx)=>`<tr style="background:${idx%2===0?"#fff":"#f0f9ff"}"><td style="font-weight:700;white-space:nowrap">${e.apellido}, ${e.nombre}</td>${inds.map(ind=>`<td style="text-align:center">${badge(e.indicadores?.[`${area}_${g}_${ind}`])}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`}</div>`;})():"";
  return`${header("Panel Inspectora · Trayectorias Cuidadas 5310 Oeste","Seguimiento de las 34 instituciones")}<div style="padding:24px;max-width:1400px;margin:0 auto">${leyenda()}<div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:flex-end"><div><div style="font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px">Área</div><div style="display:flex;gap:6px">${["lengua","matematica"].map(a=>`<button onclick="setState({supArea:'${a}',supSel:null})" style="padding:7px 16px;border-radius:8px;border:1.5px solid;font-weight:700;font-size:12px;cursor:pointer;font-family:'Source Sans 3',sans-serif;border-color:${area===a?(a==="lengua"?"#6366f1":"#0ea5e9"):"#e2e8f0"};background:${area===a?(a==="lengua"?"#6366f1":"#0ea5e9"):"#fff"};color:${area===a?"#fff":"#475569"}">${a==="lengua"?"📚 Lengua":"🔢 Matemática"}</button>`).join("")}</div></div><div><div style="font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px">Grado</div><div style="display:flex;gap:6px;flex-wrap:wrap">${GRADOS.map(gr=>`<button onclick="setState({supGrado:'${gr}',supSel:null})" style="padding:7px 14px;border-radius:8px;border:1.5px solid;font-weight:700;font-size:12px;cursor:pointer;font-family:'Source Sans 3',sans-serif;border-color:${g===gr?"#1e293b":"#e2e8f0"};background:${g===gr?"#1e293b":"#fff"};color:${g===gr?"#fff":"#475569"}">${gr}</button>`).join("")}</div></div></div><div style="background:#fff;border-radius:16px;padding:22px;box-shadow:0 2px 16px #0001">${STATE.loading?loader("Cargando todas las escuelas..."):det+`<div style="overflow-x:auto"><table style="width:100%;border-collapse:separate;border-spacing:0;font-size:12px"><thead><tr style="background:#1e293b"><th>Institución</th><th style="text-align:center">Alumnos</th>${inds.map(i=>`<th style="padding:8px 10px;color:#fff;font-weight:700;font-size:10px;max-width:110px;white-space:normal;line-height:1.3;text-align:left">${i}</th>`).join("")}</tr></thead><tbody>${ESCUELAS.map((esc,idx)=>{const{total,porInd}=stats(esc.id);const ac=STATE.supSel?.id===esc.id;return`<tr style="background:${ac?"#eff6ff":idx%2===0?"#f8fafc":"#fff"};cursor:pointer" onclick="toggleSupSel('${esc.id}')"><td style="font-weight:700;color:#1e293b"><span style="margin-right:6px;color:#94a3b8;font-size:10px">${ac?"▼":"▶"}</span>${esc.nombre}</td><td style="text-align:center;font-weight:700">${total>0?total:`<span style="color:#cbd5e1">—</span>`}</td>${porInd.map(({c,p,i:iv,total:t})=>`<td>${barra(c,p,iv,t)}</td>`).join("")}</tr>`;}).join("")}</tbody></table></div>`}</div></div>`;
}
function modalEstudiante(){
  const m=STATE.modal,e=m.est||{apellido:"",nombre:"",grado:STATE.filtroGrado||"",seccion:"",indicadores:{},observaciones:""},g=e.grado;
  const bloque=(area,color,emoji)=>{const inds=INDS[area][g]||[];if(!inds.length)return"";return`<div style="margin-bottom:18px"><div style="font-weight:700;color:${color};font-size:13px;margin-bottom:10px;padding-left:10px;border-left:3px solid ${color}">${emoji} ${area==="lengua"?"Lengua":"Matemática"}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${inds.map(ind=>{const k=`${area}_${g}_${ind}`,v=e.indicadores?.[k]||"",bg=v?{Consolidado:"#f0fdf4","En proceso":"#fffbeb",Incipiente:"#fef2f2"}[v]:"#f8fafc",fg=v?{Consolidado:"#16a34a","En proceso":"#d97706",Incipiente:"#dc2626"}[v]:"#94a3b8",bd=v?{Consolidado:"#16a34a44","En proceso":"#d9770666",Incipiente:"#dc262644"}[v]:"#e2e8f0";return`<div style="background:#f8fafc;border-radius:8px;padding:8px 10px"><div style="font-size:11px;color:#475569;margin-bottom:5px;font-weight:600">${ind}</div><select data-ind="${k}" onchange="updateInd('${k}',this.value)" style="background:${bg};color:${fg};border:1.5px solid ${bd};border-radius:8px;padding:4px 8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Source Sans 3',sans-serif;width:auto"><option value="">— seleccionar —</option>${LOGRO.map(l=>`<option value="${l}" ${v===l?"selected":""}>${l}</option>`).join("")}</select></div>`;}).join("")}</div></div>`;};
  return`<div class="modal-overlay" onclick="if(event.target===this)cerrarModal()"><div class="modal-box"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h3 style="font-family:'Playfair Display',serif;margin:0;font-size:20px;color:#1e293b">${m.mode==="new"?"Nuevo":"Editar"} estudiante</h3><button onclick="cerrarModal()" style="background:none;border:none;font-size:26px;cursor:pointer;color:#94a3b8;line-height:1">×</button></div><div style="display:grid;grid-template-columns:1fr 1fr 90px 60px;gap:10px;margin-bottom:20px"><div><label style="display:block;font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:3px;text-transform:uppercase">Apellido</label><input id="m-apellido" value="${e.apellido}" placeholder="Apellido"/></div><div><label style="display:block;font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:3px;text-transform:uppercase">Nombre</label><input id="m-nombre" value="${e.nombre}" placeholder="Nombre"/></div><div><label style="display:block;font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:3px;text-transform:uppercase">Grado</label><select id="m-grado" onchange="cambiarGrado(this.value)"><option value="">—</option>${GRADOS.map(gr=>`<option ${e.grado===gr?"selected":""}>${gr}</option>`).join("")}</select></div><div><label style="display:block;font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:3px;text-transform:uppercase">Secc.</label><input id="m-seccion" value="${e.seccion||""}" maxlength="2" placeholder="A"/></div></div><div id="bloques-inds">${g?bloque("lengua","#6366f1","📚")+bloque("matematica","#0ea5e9","🔢"):""}</div><div style="margin-top:14px"><label style="display:block;font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:3px;text-transform:uppercase">Observaciones</label><textarea id="m-obs" rows="2" placeholder="Notas sobre la trayectoria...">${e.observaciones||""}</textarea></div><div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px"><button class="btn-secondary" onclick="cerrarModal()">Cancelar</button><button class="btn-primary" onclick="guardarEstudiante()">Guardar</button></div></div></div>`;
}
function modalConfirmarBorrar(){
  const e=STATE.del;
  return`<div class="modal-overlay"><div style="background:#fff;border-radius:14px;padding:28px;max-width:360px;width:90vw;font-family:'Source Sans 3',sans-serif"><p style="font-weight:700;margin-bottom:8px">¿Eliminar a <b>${e.apellido}, ${e.nombre}</b>?</p><p style="font-size:13px;color:#64748b;margin-bottom:20px">Esta acción no se puede deshacer.</p><div style="display:flex;gap:10px;justify-content:flex-end"><button class="btn-secondary" onclick="setState({del:null})">Cancelar</button><button class="btn-primary" onclick="borrarEstudiante()" style="background:#ef4444">Eliminar</button></div></div></div>`;
}
async function selEscuela(id){
  const esc=ESCUELAS.find(e=>e.id===id);
  setState({modo:"escuela",escuela:esc,tab:"carga",loading:true,filtroGrado:"",busqEst:""});
  const data=await dbGet(`esc-${id}`);
  setState({allData:{...STATE.allData,[id]:data?JSON.parse(data):[]},loading:false});
}
async function irSupervisor(){
  setState({modo:"supervisor",loading:true,supSel:null});
  const entries=await Promise.all(ESCUELAS.map(e=>dbGet(`esc-${e.id}`).then(d=>[e.id,d?JSON.parse(d):[]])));
  const o={};entries.forEach(([id,d])=>o[id]=d);
  setState({allData:o,loading:false});
}
function irInicio(){setState({modo:"inicio",escuela:null,busq:"",supSel:null});}
function abrirModal(){setState({modal:{mode:"new",est:null}});}
function editarEst(est){setState({modal:{mode:"edit",est:JSON.parse(JSON.stringify(est))}});}
function cerrarModal(){setState({modal:null});}
function confirmarBorrar(est){setState({del:est});}
function cambiarGrado(grado){STATE.modal={...STATE.modal,est:{...(STATE.modal.est||{}),grado,indicadores:{}}};render();}
function updateInd(key,val){if(STATE.modal)STATE.modal.est.indicadores={...(STATE.modal.est.indicadores||{}),[key]:val};}
async function guardarEstudiante(){
  const m=STATE.modal;
  const apellido=document.getElementById("m-apellido")?.value.trim()||"";
  const nombre=document.getElementById("m-nombre")?.value.trim()||"";
  const grado=document.getElementById("m-grado")?.value||"";
  const seccion=document.getElementById("m-seccion")?.value.trim()||"";
  const observaciones=document.getElementById("m-obs")?.value.trim()||"";
  if(!apellido||!nombre){alert("Completá nombre y apellido.");return;}
  const indicadores={...(m.est?.indicadores||{})};
  document.querySelectorAll("[data-ind]").forEach(sel=>{if(sel.value)indicadores[sel.dataset.ind]=sel.value;});
  const est={...(m.est||{}),apellido,nombre,grado,seccion,observaciones,indicadores,id:m.est?.id||Date.now()};
  const escId=STATE.escuela.id,prev=STATE.allData[escId]||[];
  const upd=m.mode==="new"?[...prev,est]:prev.map(e=>e.id===est.id?est:e);
  setState({modal:null,allData:{...STATE.allData,[escId]:upd}});
  await dbSet(`esc-${escId}`,JSON.stringify(upd));
}
async function borrarEstudiante(){
  const escId=STATE.escuela.id,upd=(STATE.allData[escId]||[]).filter(e=>e.id!==STATE.del.id);
  setState({del:null,allData:{...STATE.allData,[escId]:upd}});
  await dbSet(`esc-${escId}`,JSON.stringify(upd));
}
function toggleSupSel(id){const esc=ESCUELAS.find(e=>e.id===id);setState({supSel:STATE.supSel?.id===id?null:esc});}
function render(){
  const r=document.getElementById("root");
  if(STATE.modo==="inicio")r.innerHTML=vistaInicio();
  else if(STATE.modo==="escuela")r.innerHTML=vistaEscuela();
  else if(STATE.modo==="supervisor")r.innerHTML=vistaSupervisor();
}
if(window.firebaseReady){render();}
else{document.addEventListener("firebaseReady",render,{once:true});render();}
</script>
</body>
</html>
